<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMU Campus Life Action Agent</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #d7dee8;
        --blue: #174ea6;
        --green: #0f766e;
        --amber: #b45309;
        --bg: #f6f8fb;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial, "Noto Sans KR", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      header {
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.7fr);
        gap: 16px;
        padding: 16px;
        min-height: calc(100vh - 79px);
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-width: 0;
      }

      .chat {
        display: flex;
        flex-direction: column;
        min-height: 680px;
      }

      .examples {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 14px;
        border-bottom: 1px solid var(--line);
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 7px;
        padding: 9px 12px;
        cursor: pointer;
        font-size: 14px;
      }

      button.primary {
        background: var(--blue);
        color: #fff;
        border-color: var(--blue);
      }

      button.action {
        background: #ecfdf5;
        border-color: #99f6e4;
        color: #115e59;
      }

      .messages {
        flex: 1;
        padding: 16px;
        overflow: auto;
      }

      .message {
        white-space: pre-wrap;
        line-height: 1.55;
        padding: 14px;
        border-radius: 8px;
        margin-bottom: 12px;
        border: 1px solid var(--line);
      }

      .user {
        background: #eff6ff;
      }

      .agent {
        background: #fff;
      }

      .composer {
        display: flex;
        gap: 8px;
        padding: 14px;
        border-top: 1px solid var(--line);
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 10px;
        font: inherit;
      }

      textarea {
        min-height: 46px;
        resize: vertical;
      }

      .side {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .panel {
        padding: 14px;
      }

      h2 {
        font-size: 16px;
        margin: 0 0 10px;
      }

      .item {
        border-top: 1px solid var(--line);
        padding: 10px 0;
        font-size: 14px;
      }

      .item:first-of-type {
        border-top: 0;
      }

      .muted {
        color: var(--muted);
      }

      .source-id {
        font-weight: 700;
        color: var(--blue);
      }

      .action-form {
        display: grid;
        gap: 8px;
      }

      .status {
        color: var(--amber);
        font-size: 14px;
      }

      @media (max-width: 960px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const API_BASE = window.location.origin;
      const examples = [
        "예비군 때문에 결석하는데 뭐 해야 해?",
        "5월 15일에 예비군 때문에 결석하는데 출석인정 언제까지 내야 해?",
        "질병휴학 하려면 뭐 필요해?",
        "수강신청 완료됐는지 어디서 확인해?",
        "졸업예정증명서 어디서 뽑아?",
        "내 학번이랑 성적으로 처리해줘."
      ];

      function App() {
        const [question, setQuestion] = React.useState(examples[0]);
        const [messages, setMessages] = React.useState([]);
        const [toolLogs, setToolLogs] = React.useState([]);
        const [citations, setCitations] = React.useState([]);
        const [actions, setActions] = React.useState([]);
        const [actionState, setActionState] = React.useState(null);
        const [slots, setSlots] = React.useState({});
        const [loading, setLoading] = React.useState(false);

        async function ask(text = question) {
          if (!text.trim()) return;
          setLoading(true);
          setMessages((prev) => [...prev, { role: "user", text }]);
          const res = await fetch(`${API_BASE}/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: text })
          });
          const data = await res.json();
          setMessages((prev) => [...prev, { role: "agent", text: data.answer }]);
          setToolLogs(data.tool_logs || []);
          setCitations(data.citations || []);
          setActions(data.next_actions || []);
          setActionState(null);
          setLoading(false);
        }

        async function startAction(actionId) {
          const res = await fetch(`${API_BASE}/actions/start`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action_id: actionId })
          });
          const data = await res.json();
          setActionState(data);
          setSlots({});
        }

        async function continueAction() {
          const res = await fetch(`${API_BASE}/actions/continue`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action_id: actionState.action_id, slots })
          });
          const data = await res.json();
          if (data.status === "completed") {
            setMessages((prev) => [
              ...prev,
              { role: "agent", text: `${data.document}\n\n[제출 전 체크리스트]\n${data.checklist.map((x, i) => `${i + 1}. ${x}`).join("\n")}` }
            ]);
            setActionState(null);
          } else {
            setActionState(data);
          }
        }

        return (
          <>
            <header>
              <h1>KMU Campus Life Action Agent</h1>
              <p>국민대 공식 근거 기반 학교생활 내비게이터: 답변, 출처, Tool 로그, 다음 행동까지 확인합니다.</p>
            </header>
            <main>
              <section className="chat">
                <div className="examples">
                  {examples.map((item) => (
                    <button key={item} onClick={() => { setQuestion(item); ask(item); }}>{item}</button>
                  ))}
                </div>
                <div className="messages">
                  {messages.length === 0 && <div className="message agent muted">예시 질문을 누르거나 직접 질문을 입력하세요.</div>}
                  {messages.map((message, idx) => (
                    <div key={idx} className={`message ${message.role === "user" ? "user" : "agent"}`}>{message.text}</div>
                  ))}
                </div>
                <div className="composer">
                  <textarea value={question} onChange={(event) => setQuestion(event.target.value)} />
                  <button className="primary" disabled={loading} onClick={() => ask()}>{loading ? "처리 중" : "질문"}</button>
                </div>
              </section>

              <div className="side">
                <section className="panel">
                  <h2>다음 행동</h2>
                  {actions.length === 0 && <p className="muted">질문 후 action이 표시됩니다.</p>}
                  {actions.map((action) => (
                    <div className="item" key={action.action_id}>
                      <strong>{action.label}</strong>
                      <p className="muted">{action.description}</p>
                      <button className="action" onClick={() => startAction(action.action_id)}>시작</button>
                    </div>
                  ))}
                  {actionState && (
                    <div className="item">
                      <h2>{actionState.label || "Action"}</h2>
                      {actionState.privacy_notice && <p className="status">{actionState.privacy_notice}</p>}
                      <div className="action-form">
                        {(actionState.missing_slots || []).map((slot, idx) => (
                          <label key={slot}>
                            <span className="muted">{actionState.questions[idx]}</span>
                            <input value={slots[slot] || ""} onChange={(event) => setSlots({ ...slots, [slot]: event.target.value })} />
                          </label>
                        ))}
                        <button className="primary" onClick={continueAction}>초안 생성</button>
                      </div>
                    </div>
                  )}
                </section>

                <section className="panel">
                  <h2>출처</h2>
                  {citations.length === 0 && <p className="muted">답변의 [S1] 출처가 여기에 표시됩니다.</p>}
                  {citations.map((source) => (
                    <div className="item" key={source.id}>
                      <div><span className="source-id">[{source.id}]</span> {source.title}</div>
                      <div className="muted">Tier {source.source_tier} · {source.source_type} · {source.department || ""}</div>
                      <p>{source.text}</p>
                      <a href={source.url} target="_blank" rel="noreferrer">공식 문서 열기</a>
                    </div>
                  ))}
                </section>

                <section className="panel">
                  <h2>Tool Calling 로그</h2>
                  {toolLogs.length === 0 && <p className="muted">질문 처리 과정이 표시됩니다.</p>}
                  {toolLogs.map((log, idx) => <div className="item" key={idx}>{idx + 1}. {log}</div>)}
                </section>
              </div>
            </main>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
